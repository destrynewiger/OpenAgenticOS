<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OpenAgenticOS Call Cockpit — Options</title>
  <style>
    body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #e6edf3; padding: 22px; max-width: 540px; }
    h1 { font-size: 18px; } label { display: block; margin: 14px 0 4px; font-weight: 600; }
    input[type=text] { width: 100%; padding: 8px 10px; background: #161b22; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; }
    .row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    button { margin-top: 18px; background: #238636; color: #fff; border: 0; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    .muted { color: #8b949e; font-size: 12px; } code { background: #161b22; padding: 1px 5px; border-radius: 4px; }
    #saved { color: #3fb950; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>OpenAgenticOS Call Cockpit</h1>
  <label for="apiBase">Command center API base URL</label>
  <input type="text" id="apiBase" placeholder="http://localhost:4100" />
  <p class="muted">Local dev: <code>http://localhost:4100</code>. Remote hubs should use HTTPS. Plain HTTP can be blocked as mixed content on HTTPS pages.</p>
  <div class="row"><input type="checkbox" id="autoOpenLinkedIn" /><label for="autoOpenLinkedIn" style="margin:0">Auto-open LinkedIn when a contact connects (off is best for parallel dialing)</label></div>
  <div><button id="save">Save</button><span id="saved"></span></div>
  <script src="options.js"></script>
</body>
</html>
